<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Αντικαταστάσεις</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F5F4F0;
    --surface: #FFFFFF;
    --border: #E2E0D8;
    --text-primary: #1A1917;
    --text-secondary: #6B6860;
    --text-tertiary: #A8A59E;
    --blue-bg: #EBF2FC;
    --blue-text: #1A4F8A;
    --blue-badge: #C2D9F5;
    --accent: #2563EB;
    --bar-track: #E8E6E0;
    --row-hover: #FAFAF8;
    --section-bg: #F0EEE9;
    --font: 'IBM Plex Sans', sans-serif;
    --mono: 'IBM Plex Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .header-left h1 {
    font-size: 16px;
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: -0.01em;
  }

  .header-left .school {
    font-size: 12px;
    color: var(--text-secondary);
    margin-top: 2px;
    font-family: var(--mono);
  }

  .date-display {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-secondary);
    background: var(--section-bg);
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
  }

  .main {
    max-width: 860px;
    margin: 0 auto;
    padding: 1.5rem 1.5rem;
  }

  .stats-row {
    display: flex;
    gap: 10px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 18px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-card .num {
    font-size: 22px;
    font-weight: 600;
    font-family: var(--mono);
    color: var(--text-primary);
    line-height: 1;
  }

  .stat-card .lbl {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .state-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 2rem;
    text-align: center;
    color: var(--text-tertiary);
    font-size: 14px;
    margin-bottom: 1.5rem;
  }

  .state-box .state-icon {
    font-size: 28px;
    margin-bottom: 10px;
    display: block;
  }

  .section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--section-bg);
    border-bottom: 1px solid var(--border);
  }

  .absent-name {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-primary);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .absent-name::before {
    content: '';
    display: inline-block;
    width: 6px;
    height: 6px;
    background: #E24B4A;
    border-radius: 50%;
  }

  .count-badge {
    font-size: 11px;
    color: var(--blue-text);
    background: var(--blue-badge);
    border-radius: 4px;
    padding: 2px 8px;
    font-family: var(--mono);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    padding: 8px 16px;
    text-align: left;
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.1s;
  }

  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }

  td {
    padding: 10px 16px;
    vertical-align: middle;
  }

  .hour-badge {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    background: var(--section-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 8px;
    min-width: 38px;
  }

  .hour-badge .h-num {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text-primary);
    line-height: 1;
  }

  .hour-badge .h-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--text-tertiary);
    line-height: 1;
    margin-top: 2px;
  }

  .person-name {
    font-size: 13px;
    color: var(--text-primary);
    font-weight: 500;
  }

  .tmima-pill {
    display: inline-block;
    background: var(--blue-bg);
    color: var(--blue-text);
    border-radius: 5px;
    padding: 3px 10px;
    font-size: 12px;
    font-weight: 600;
    font-family: var(--mono);
    letter-spacing: 0.02em;
  }

  hr.divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 1.5rem 0;
  }

  .bars-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1.25rem 1.5rem;
  }

  .bars-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--text-tertiary);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 14px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 10px;
  }

  .bar-row:last-child { margin-bottom: 0; }

  .bar-name {
    font-size: 13px;
    color: var(--text-primary);
    min-width: 150px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .bar-track {
    flex: 1;
    background: var(--bar-track);
    border-radius: 3px;
    height: 6px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 3px;
    transition: width 0.4s ease;
  }

  .bar-num {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--text-secondary);
    min-width: 24px;
    text-align: right;
  }

  .error-box {
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 8px;
    padding: 1rem 1.25rem;
    font-size: 13px;
    color: #991B1B;
    margin-bottom: 1rem;
  }

  .spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 10px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .refresh-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font);
    font-size: 12px;
    color: var(--text-secondary);
    background: var(--section-bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 5px 12px;
    cursor: pointer;
    transition: background 0.15s;
  }

  .refresh-btn:hover { background: var(--border); }

  @media (max-width: 600px) {
    header { padding: 0.75rem 1rem; }
    .main { padding: 1rem; }
    .bar-name { min-width: 110px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Πρόγραμμα Αντικαταστάσεων</h1>
    <div class="school">leonteios921.sharepoint.com</div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
    <div class="date-display" id="dateDisplay">—</div>
    <button class="refresh-btn" onclick="loadData()">&#8635; Ανανέωση</button>
  </div>
</header>

<div class="main">
  <div class="stats-row">
    <div class="stat-card">
      <div class="num" id="statTotal">—</div>
      <div class="lbl">Αντικαταστάσεις σήμερα</div>
    </div>
    <div class="stat-card">
      <div class="num" id="statAbsent">—</div>
      <div class="lbl">Απόντες καθηγητές</div>
    </div>
  </div>

  <div id="content">
    <div class="state-box">
      <div class="spinner"></div>
      Φόρτωση δεδομένων...
    </div>
  </div>

  <hr class="divider">

  <div class="bars-section" id="barsSection" style="display:none;">
    <div class="bars-title">Σύνολο αντικαταστάσεων φέτος</div>
    <div id="barsContent"></div>
  </div>
</div>

<script>
// ── ΡΥΘΜΙΣΕΙΣ ──────────────────────────────────────────────
const SITE_URL = 'https://leonteios921.sharepoint.com/sites/antikatastaseis';
const LIST_NAME = 'Αντικαταστάσεις';

// Ωράριο σχολείου (8 ώρες)
const SCHEDULE = [
  { label: '1η', time: '08:00' },
  { label: '2η', time: '09:00' },
  { label: '3η', time: '10:00' },
  { label: '4η', time: '11:00' },
  { label: '5η', time: '12:00' },
  { label: '6η', time: '13:00' },
  { label: '7η', time: '14:00' },
  { label: '8η', time: '15:00' },
];
// ──────────────────────────────────────────────────────────

function todayISO() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}

function formatDateGR(iso) {
  const days = ['Κυριακή','Δευτέρα','Τρίτη','Τετάρτη','Πέμπτη','Παρασκευή','Σάββατο'];
  const months = ['Ιανουαρίου','Φεβρουαρίου','Μαρτίου','Απριλίου','Μαΐου','Ιουνίου','Ιουλίου','Αυγούστου','Σεπτεμβρίου','Οκτωβρίου','Νοεμβρίου','Δεκεμβρίου'];
  const d = new Date(iso + 'T00:00:00');
  return `${days[d.getDay()]}, ${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
}

function hourIndex(label) {
  const n = parseInt(label);
  return isNaN(n) ? 99 : n;
}

function extractPersonName(field) {
  if (!field) return '—';
  if (typeof field === 'string') return field;
  if (field.Title) return field.Title;
  if (field.Name) return field.Name;
  return '—';
}

async function fetchTodayItems() {
  const today = todayISO();
  const tomorrow = new Date(today);
  tomorrow.setDate(tomorrow.getDate() + 1);
  const tomorrowISO = tomorrow.toISOString().split('T')[0];

  const filter = `Ημερομηνία ge datetime'${today}T00:00:00Z' and Ημερομηνία lt datetime'${tomorrowISO}T00:00:00Z'`;
  const select = `Title,Ημερομηνία,Ώρα,Τμήμα,Αντικαταστάτης/Title,Αντικαταστάτης/Name,Απών_x0020_Καθηγητής`;
  const expand = `Αντικαταστάτης`;

  const url = `${SITE_URL}/_api/web/lists/getbytitle('${encodeURIComponent(LIST_NAME)}')/items?$filter=${encodeURIComponent(filter)}&$select=${encodeURIComponent(select)}&$expand=${encodeURIComponent(expand)}&$top=100`;

  const res = await fetch(url, {
    headers: { 'Accept': 'application/json;odata=verbose' },
    credentials: 'include'
  });

  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  return json.d.results;
}

async function fetchAllItems() {
  const select = `Αντικαταστάτης/Title,Αντικαταστάτης/Name`;
  const expand = `Αντικαταστάτης`;
  const url = `${SITE_URL}/_api/web/lists/getbytitle('${encodeURIComponent(LIST_NAME)}')/items?$select=${encodeURIComponent(select)}&$expand=${encodeURIComponent(expand)}&$top=5000`;

  const res = await fetch(url, {
    headers: { 'Accept': 'application/json;odata=verbose' },
    credentials: 'include'
  });

  if (!res.ok) return [];
  const json = await res.json();
  return json.d.results;
}

function renderSchedule(items) {
  const content = document.getElementById('content');

  if (items.length === 0) {
    content.innerHTML = `<div class="state-box"><span class="state-icon">✓</span>Δεν υπάρχουν αντικαταστάσεις για σήμερα.</div>`;
    document.getElementById('statTotal').textContent = '0';
    document.getElementById('statAbsent').textContent = '0';
    return;
  }

  // Ομαδοποίηση ανά απόντα
  const groups = {};
  items.forEach(item => {
    const absent = item['Απών_x0020_Καθηγητής'] || item['Title'] || '—';
    if (!groups[absent]) groups[absent] = [];
    groups[absent].push(item);
  });

  // Ταξινόμηση ωρών μέσα σε κάθε ομάδα
  Object.keys(groups).forEach(k => {
    groups[k].sort((a, b) => hourIndex(a['Ώρα']) - hourIndex(b['Ώρα']));
  });

  document.getElementById('statTotal').textContent = items.length;
  document.getElementById('statAbsent').textContent = Object.keys(groups).length;

  let html = '';

  Object.keys(groups).sort().forEach(absent => {
    const rows = groups[absent];
    const cnt = rows.length;
    const cntLabel = cnt === 1 ? '1 αντικατάσταση' : `${cnt} αντικαταστάσεις`;

    html += `
      <div class="section">
        <div class="section-header">
          <span class="absent-name">${esc(absent)}</span>
          <span class="count-badge">${cntLabel}</span>
        </div>
        <table>
          <thead>
            <tr>
              <th style="width:70px;">Ώρα</th>
              <th>Αντικαταστάτης</th>
              <th style="width:100px;">Τμήμα</th>
            </tr>
          </thead>
          <tbody>
    `;

    rows.forEach(item => {
      const ora = item['Ώρα'] || '—';
      const idx = hourIndex(ora);
      const schedEntry = SCHEDULE[idx - 1];
      const timeStr = schedEntry ? schedEntry.time : '';
      const antik = extractPersonName(item['Αντικαταστάτης']);
      const tmima = item['Τμήμα'] || '—';

      html += `
        <tr>
          <td>
            <div class="hour-badge">
              <span class="h-num">${esc(ora)}</span>
              ${timeStr ? `<span class="h-time">${timeStr}</span>` : ''}
            </div>
          </td>
          <td><span class="person-name">${esc(antik)}</span></td>
          <td><span class="tmima-pill">${esc(tmima)}</span></td>
        </tr>
      `;
    });

    html += `</tbody></table></div>`;
  });

  content.innerHTML = html;
}

async function renderBars(allItems) {
  const counts = {};
  allItems.forEach(item => {
    const name = extractPersonName(item['Αντικαταστάτης']);
    if (name && name !== '—') {
      counts[name] = (counts[name] || 0) + 1;
    }
  });

  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
  if (sorted.length === 0) return;

  const max = sorted[0][1];
  const barsSection = document.getElementById('barsSection');
  const barsContent = document.getElementById('barsContent');

  let html = '';
  sorted.forEach(([name, count]) => {
    const pct = Math.round((count / max) * 100);
    html += `
      <div class="bar-row">
        <div class="bar-name">${esc(name)}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
        <div class="bar-num">${count}</div>
      </div>
    `;
  });

  barsContent.innerHTML = html;
  barsSection.style.display = 'block';
}

function esc(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

async function loadData() {
  const today = todayISO();
  document.getElementById('dateDisplay').textContent = formatDateGR(today);
  document.getElementById('content').innerHTML = `<div class="state-box"><div class="spinner"></div>Φόρτωση δεδομένων...</div>`;
  document.getElementById('barsSection').style.display = 'none';

  try {
    const [todayItems, allItems] = await Promise.all([fetchTodayItems(), fetchAllItems()]);
    renderSchedule(todayItems);
    renderBars(allItems);
  } catch (err) {
    document.getElementById('content').innerHTML = `
      <div class="error-box">
        <strong>Σφάλμα φόρτωσης:</strong> ${esc(err.message)}<br>
        <small style="margin-top:6px;display:block;opacity:0.8;">Βεβαιώσου ότι είσαι συνδεδεμένος στο SharePoint με τον σχολικό σου λογαριασμό.</small>
      </div>
    `;
  }
}

loadData();
</script>
</body>
</html>
